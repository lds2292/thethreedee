    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "toolzydev",
      "url": "https://toolzydev.com",
      "description": "Free, browser-based developer tools. JSON Formatter, 3D Viewer, and more.",
      "inLanguage": ["en", "ko"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://toolzydev.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: ItemList (tools) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "toolzydev Developer Tools",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "JSON Formatter",
          "url": "https://toolzydev.com/json",
          "description": "Free online JSON formatter, validator, minifier, and converter."
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "3D Viewer",
          "url": "https://toolzydev.com/3d-viewer",
          "description": "Free browser-based 3D file viewer supporting STL, OBJ, GLTF, and GLB formats."
        }
      ]
    }
    </script>
