    <!-- JSON-LD: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I test a regular expression online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Go to regex.toolzydev.com, type your regex pattern in the pattern bar at the top, and enter your test string in the Test String panel. Matches are highlighted in real time as you type."
          }
        },
        {
          "@type": "Question",
          "name": "What are capture groups in regex?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Capture groups are portions of a regex pattern enclosed in parentheses, e.g. (\\d+). They capture the matched substring so you can reference it later. The Results panel shows each capture group value for every match."
          }
        },
        {
          "@type": "Question",
          "name": "How do I use the replace feature?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Enter your regex pattern in the pattern bar, type a replacement string in the Replace bar at the bottom, and click Replace All. You can use $1, $2, etc. to reference capture groups in the replacement."
          }
        },
        {
          "@type": "Question",
          "name": "What regex flags are supported?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Regex Tester supports four flags: g (global — find all matches), i (case-insensitive), m (multiline — ^ and $ match line boundaries), and s (dotAll — dot matches newlines). Toggle them individually with the flag buttons."
          }
        },
        {
          "@type": "Question",
          "name": "Is this regex tester free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Regex Tester at regex.toolzydev.com is completely free. No login or installation required. All regex processing happens locally in your browser — your data is never sent to a server."
          }
        }
      ]
    }
